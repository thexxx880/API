<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Panel Publicador JSON</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080b10;
  --surface: #0e1219;
  --surface2: #141924;
  --surface3: #1c2333;
  --border: rgba(255,255,255,0.06);
  --accent: #4f9eff;
  --accent2: #a78bfa;
  --accent-glow: rgba(79,158,255,0.18);
  --danger: #ff4f6a;
  --text: #e8edf5;
  --muted: #6b7a96;
  --radius: 14px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  padding: 32px 20px;
  background-image:
    radial-gradient(ellipse 80% 50% at 20% -10%, rgba(79,158,255,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 110%, rgba(167,139,250,0.06) 0%, transparent 60%);
}

.panel {
  max-width: 960px;
  margin: 0 auto;
}

/* ── Header ── */
.header {
  text-align: center;
  margin-bottom: 40px;
}
.header .eyebrow {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.2em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 10px;
  opacity: 0.85;
}
.header h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(28px, 5vw, 44px);
  font-weight: 800;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #e8edf5 30%, #4f9eff 70%, #a78bfa 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.1;
}

/* ── Sections ── */
.section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 24px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}
.section::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(79,158,255,0.04) 0%, transparent 50%);
  pointer-events: none;
}
.section-label {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.15em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 14px;
}

/* ── Inputs ── */
.input-group {
  display: flex;
  gap: 10px;
  align-items: stretch;
}
.input-group input { flex: 1; }

input, select {
  width: 100%;
  padding: 13px 16px;
  background: var(--surface3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 400;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input::placeholder { color: var(--muted); font-weight: 300; }
input:focus, select:focus {
  border-color: rgba(79,158,255,0.5);
  box-shadow: 0 0 0 3px rgba(79,158,255,0.1);
}
input[type="password"] { letter-spacing: 0.05em; }

/* Search bar */
.search-wrap { position: relative; }
.search-wrap svg {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  pointer-events: none;
}
.search-wrap input { padding-left: 42px; }

/* ── Buttons ── */
button {
  padding: 13px 22px;
  border: none;
  border-radius: var(--radius);
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  letter-spacing: 0.01em;
}

.btn-save {
  background: var(--surface3);
  color: var(--accent);
  border: 1px solid rgba(79,158,255,0.25);
}
.btn-save:hover {
  background: rgba(79,158,255,0.1);
  border-color: rgba(79,158,255,0.5);
}

.btn-danger {
  background: rgba(255,79,106,0.12);
  color: var(--danger);
  border: 1px solid rgba(255,79,106,0.2);
  width: 100%;
  margin-top: 10px;
}
.btn-danger:hover {
  background: rgba(255,79,106,0.2);
  border-color: rgba(255,79,106,0.4);
}

.btn-publish {
  background: linear-gradient(135deg, #4f9eff, #a78bfa);
  color: #fff;
  width: 100%;
  margin-top: 16px;
  padding: 15px;
  font-size: 15px;
  box-shadow: 0 4px 24px rgba(79,158,255,0.25);
}
.btn-publish:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 32px rgba(79,158,255,0.4);
}
.btn-publish:active { transform: translateY(0); }

/* ── Hint text ── */
.hint {
  font-size: 12px;
  color: var(--muted);
  margin-top: 10px;
  line-height: 1.6;
  font-weight: 300;
}
.hint span { color: var(--accent); font-weight: 500; }

/* ── Results grid ── */
#resultados {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 14px;
  margin-top: 20px;
}

.card {
  background: var(--surface2);
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  border: 1px solid var(--border);
  transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
  position: relative;
}
.card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%);
  opacity: 0;
  transition: opacity 0.25s;
}
.card:hover {
  transform: translateY(-5px);
  border-color: rgba(79,158,255,0.4);
  box-shadow: 0 12px 40px rgba(0,0,0,0.4);
}
.card:hover::after { opacity: 1; }
.card img { width: 100%; height: 225px; object-fit: cover; display: block; }
.card .info { padding: 10px 12px; }
.card .info .title {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 600;
  line-height: 1.35;
}
.card .info .year { font-size: 11px; color: var(--muted); margin-top: 3px; }

/* ── Message ── */
#msg {
  margin-top: 16px;
  padding: 14px 16px;
  border-radius: var(--radius);
  font-size: 13px;
  display: none;
}
#msg.show { display: block; }
#msg.ok  { background: rgba(79,255,158,0.08); border: 1px solid rgba(79,255,158,0.2); color: #4fff9e; }
#msg.err { background: rgba(255,79,106,0.08); border: 1px solid rgba(255,79,106,0.2); color: var(--danger); }

/* ── Modal ── */
.modal {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
  padding: 20px;
}
.modal.open { display: flex; }

.modal-box {
  width: 100%;
  max-width: 500px;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  padding: 28px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(79,158,255,0.08);
  max-height: 92vh;
  overflow-y: auto;
  animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(30px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-poster-wrap {
  display: flex;
  gap: 18px;
  align-items: flex-start;
  margin-bottom: 22px;
}
.modal img {
  width: 100px;
  height: 150px;
  object-fit: cover;
  border-radius: 12px;
  flex-shrink: 0;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}
.modal-meta { flex: 1; padding-top: 4px; }
.modal-meta h2 {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 700;
  line-height: 1.3;
  margin-bottom: 8px;
}
.modal-meta .id-badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 500;
  color: var(--accent);
  background: rgba(79,158,255,0.1);
  border: 1px solid rgba(79,158,255,0.2);
  border-radius: 6px;
  padding: 3px 8px;
  letter-spacing: 0.05em;
}

.modal-divider {
  height: 1px;
  background: var(--border);
  margin: 20px 0;
}

.field-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
  margin-top: 16px;
  display: block;
}
.field-label:first-of-type { margin-top: 0; }

select#plataforma {
  height: 130px;
  padding: 8px;
}
select#plataforma option {
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
}

.links-stack { display: flex; flex-direction: column; gap: 10px; }

/* Scrollbar */
.modal-box::-webkit-scrollbar { width: 4px; }
.modal-box::-webkit-scrollbar-track { background: transparent; }
.modal-box::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

@media(max-width:600px){
  .input-group { flex-direction: column; }
  .modal-poster-wrap { flex-direction: column; align-items: center; text-align: center; }
  .modal img { width: 120px; height: 175px; }
}
</style>
</head>
<body>

<div class="panel">
  <header class="header">
    <p class="eyebrow">Panel de Administración</p>
    <h1>🎬 Publicador JSON</h1>
  </header>

  <!-- Token -->
  <div class="section">
    <p class="section-label">Autenticación</p>
    <div class="input-group">
      <input type="password" id="token" placeholder="Pega tu Token de GitHub aquí…">
      <button class="btn-save" onclick="guardarToken()">💾 Guardar</button>
    </div>
    <p class="hint">El token se guarda localmente en tu navegador. <span>Nunca se envía a terceros.</span></p>
  </div>

  <!-- Búsqueda -->
  <div class="section">
    <p class="section-label">Buscar Película</p>
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="buscar" placeholder="Nombre de la película…" onkeyup="buscarTMDB()">
    </div>
    <div id="resultados"></div>
    <div id="msg"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-poster-wrap">
      <img id="posterModal" src="" alt="Poster">
      <div class="modal-meta">
        <h2 id="tituloSel">Título de la Película</h2>
        <span class="id-badge" id="idSel">ID: —</span>
      </div>
    </div>

    <div class="modal-divider"></div>

    <span class="field-label">Plataformas de Streaming</span>
    <select id="plataforma" multiple></select>
    <p class="hint">Mantén <span>Ctrl</span> (o <span>Cmd</span> en Mac) para seleccionar varias.</p>

    <span class="field-label" style="margin-top:18px;">Enlaces de Video</span>
    <div class="links-stack">
      <input type="text" id="video1" placeholder="🔗 Enlace principal">
      <input type="text" id="video2" placeholder="🔗 Enlace alternativo 2">
      <input type="text" id="video3" placeholder="🔗 Enlace alternativo 3">
    </div>

    <button class="btn-publish" onclick="publicar()">🚀 Publicar en GitHub</button>
    <button class="btn-danger" onclick="cerrarModal()">✕ Cerrar</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
